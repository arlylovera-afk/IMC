<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora IMC</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="container">
    <h1>Calculadora IMC </h1>

    <label>Peso (kg)</label>
    <input type="number" id="peso" placeholder="Ej. 70">

    <label>Altura (m)</label>
    <input type="number" step="0.01" id="altura" placeholder="Ej. 1.70">

    <button id="btnCalcular">Calcular</button>

    <div class="resultado">
        <p>Tu IMC es:</p>
        <h2 id="resultado">--</h2>
        <p id="mensaje"></p>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
